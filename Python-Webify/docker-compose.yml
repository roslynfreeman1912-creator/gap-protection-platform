version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gap_postgres
    environment:
      POSTGRES_DB: gap_protection
      POSTGRES_USER: gap_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gap_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gap_scanner
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gap_user:${DB_PASSWORD:-change_this_password}@postgres:5432/gap_protection
      NODE_ENV: production
      PORT: 5000
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - ./vuln:/app/vuln:ro
      - ./reports:/app/reports
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
